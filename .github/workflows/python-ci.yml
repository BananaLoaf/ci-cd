name: Python CI

on:
  workflow_call:
    inputs:
      skip-lint:
        required: false
        type: boolean
        default: false
      skip-typecheck:
        required: false
        type: boolean
        default: false
      skip-test:
        required: false
        type: boolean
        default: false

      mypy-path:
        required: true
        type: string
        default: "."
      mypy-options:
        required: false
        type: string
        default: ""
      
      pytest-options:
        required: false
        type: string
        default: ""

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip-lint }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install the project
        run: uv sync --locked --all-extras

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format
        run: uv run ruff format --check .

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    needs: lint
    if: always() && !inputs.skip-typecheck && (needs.lint.result == 'success' || needs.lint.result == 'skipped')

    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install the project
        run: uv sync --locked --all-extras

      - name: Mypy
        run: uv run mypy ${{ inputs.mypy-path }} ${{ inputs.mypy-options }}

  test:
    name: test
    runs-on: ubuntu-latest
    needs: typecheck
    if: always() && !inputs.skip-test && (needs.typecheck.result == 'success' || needs.typecheck.result == 'skipped')

    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install the project
        run: uv sync --locked --all-extras

      - name: Test
        run: uv run pytest ${{ inputs.pytest-options }}
